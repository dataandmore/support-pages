version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: support_portal
      POSTGRES_USER: support_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U support_user -d support_portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: support-portal:latest
    restart: always
    environment:
      DATABASE_URL: postgresql://support_user:${POSTGRES_PASSWORD}@db:5432/support_portal
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://super.support.dataandmore.com
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      POSTMARK_API_KEY: ${POSTMARK_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
