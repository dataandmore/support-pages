# Fix dataandmore.com uploads: serve /uploads/ from disk via nginx.
# Next.js standalone only embeds public/ at build time; runtime uploads need nginx.
name: Fix dataandmore.com Uploads

on:
  push:
    branches: [cursor/fix-dataandmore-uploads-2bbe]
  workflow_dispatch:

env:
  DEPLOY_HOST: 157.180.21.113
  DEPLOY_USER: root
  UPLOADS_DIR: /opt/dataandmore/public/uploads

jobs:
  fix-uploads:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Patch nginx and verify uploads
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            NGINX_CONF=/etc/nginx/sites-enabled/dataandmore.com
            MARKER="# ── User uploads (runtime, not in Next standalone build) ──"

            if grep -q "location \^~ /uploads/" "$NGINX_CONF"; then
              echo "Uploads location already configured"
            else
              cp "$NGINX_CONF" "${NGINX_CONF}.bak.$(date +%s)"
              python3 <<'PY'
            from pathlib import Path
            conf = Path("/etc/nginx/sites-enabled/dataandmore.com")
            text = conf.read_text()
            marker = "    # ── CMS MCP (Streamable HTTP)"
            block = (
                "    # ── User uploads (runtime, not in Next standalone build) ──\n"
                "    location ^~ /uploads/ {\n"
                "        alias /opt/dataandmore/public/uploads/;\n"
                "        access_log off;\n"
                "        expires 30d;\n"
                "        add_header Cache-Control \"public, max-age=2592000\";\n"
                "    }\n\n"
            )
            if block.strip() in text:
                raise SystemExit(0)
            if marker not in text:
                raise SystemExit(f"Marker not found in {conf}")
            conf.write_text(text.replace(marker, block + marker, 1))
            print("Patched nginx config")
            PY
              nginx -t
              systemctl reload nginx
              echo "Nginx reloaded"
            fi

            echo ""
            echo "=== Verify via nginx (localhost) ==="
            curl -sI -H "Host: dataandmore.com" \
              "https://127.0.0.1/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" \
              --insecure | head -5

            echo ""
            echo "=== Verify public URL ==="
            curl -sI "https://dataandmore.com/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" | head -5
