# Fix dataandmore.com uploads: serve /uploads/ from disk via nginx.
# Next.js standalone only embeds public/ at build time; runtime uploads need nginx.
name: Fix dataandmore.com Uploads

on:
  push:
    branches: [cursor/fix-dataandmore-uploads-2bbe]
  workflow_dispatch:

env:
  DEPLOY_HOST: 157.180.21.113
  DEPLOY_USER: root

jobs:
  fix-uploads:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Patch nginx and verify uploads
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: false
          command_timeout: 5m
          script: |
            set -euo pipefail
            NGINX_CONF=/etc/nginx/sites-enabled/dataandmore.com

            if grep -q 'location ^~ /uploads/' "$NGINX_CONF"; then
              echo "Uploads location already configured"
            else
              echo "Patching nginx config..."
              cp "$NGINX_CONF" "${NGINX_CONF}.bak.$(date +%s)"
              LINE=$(grep -n 'location ^~ /api/mcp' "$NGINX_CONF" | head -1 | cut -d: -f1)
              if [ -z "$LINE" ]; then
                echo "Could not find /api/mcp block in nginx config"
                exit 1
              fi
              {
                head -n $((LINE - 1)) "$NGINX_CONF"
                cat <<'NGINX'

                # User uploads (runtime, not in Next standalone build)
                location ^~ /uploads/ {
                    alias /opt/dataandmore/public/uploads/;
                    access_log off;
                    expires 30d;
                    add_header Cache-Control "public, max-age=2592000";
                }

            NGINX
                tail -n +"$LINE" "$NGINX_CONF"
              } > "${NGINX_CONF}.new"
              mv "${NGINX_CONF}.new" "$NGINX_CONF"
              nginx -t
              systemctl reload nginx
              echo "Nginx reloaded"
            fi

            echo "=== Verify public URL ==="
            curl -sI "https://dataandmore.com/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" | head -5
            curl -sI "https://dataandmore.com/uploads/1781514028053-dlp-scan-release.png" | head -5
