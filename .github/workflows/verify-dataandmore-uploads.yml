# Verify dataandmore.com upload fix
name: Verify dataandmore Uploads

on:
  push:
    branches: [cursor/fix-dataandmore-uploads-2bbe]
  workflow_dispatch:

env:
  DEPLOY_HOST: 157.180.21.113
  DEPLOY_USER: root

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: false
          script: |
            set +e
            echo "=== uploads block in nginx ==="
            grep -n -A8 'location \^~ /uploads/' /etc/nginx/sites-enabled/dataandmore.com

            echo ""
            echo "=== file on disk ==="
            ls -la /opt/dataandmore/public/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png

            echo ""
            echo "=== curl via nginx http (port 80 redirect?) ==="
            curl -sI "http://127.0.0.1/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" -H "Host: dataandmore.com" | head -8

            echo ""
            echo "=== curl https local ==="
            curl -sI -k "https://127.0.0.1/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" -H "Host: dataandmore.com" | head -8

            echo ""
            echo "=== curl public ==="
            curl -sI "https://dataandmore.com/uploads/1781586472083-Screenshot_2026-06-04_at_09.49.12.png" | head -8
