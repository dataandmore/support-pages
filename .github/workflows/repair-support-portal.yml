# Diagnose and repair support.dataandmore.com
name: Repair Support Portal

on:
  push:
    branches: [cursor/repair-support-portal-2bbe]
  workflow_dispatch:

env:
  DEPLOY_HOST: 89.167.19.63
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/support-portal

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Diagnose and fix
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: false
          command_timeout: 12m
          script: |
            set +e
            APP_DIR="${{ env.DEPLOY_PATH }}"
            cd "$APP_DIR"

            echo "=== Docker status ==="
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'

            echo ""
            echo "=== App logs (last 40) ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs app --tail=40 2>&1

            echo ""
            echo "=== DB logs (last 20) ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod logs db --tail=20 2>&1

            echo ""
            echo "=== DB connectivity from app ==="
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              exec -T app sh -c 'node -e "const {PrismaClient}=require(\"@prisma/client\"); const p=new PrismaClient(); p.\$queryRaw\`SELECT 1\`.then(r=>{console.log(\"OK\",r);process.exit(0)}).catch(e=>{console.error(\"FAIL\",e.message);process.exit(1)})"' 2>&1

            echo ""
            echo "=== Curl homepage ==="
            curl -sI http://127.0.0.1:3000/en | head -5

            echo ""
            echo "=== Docker volumes ==="
            docker volume ls | rg support-portal

            echo ""
            echo "=== Attempt repair: ensure db healthy + restart app ==="
            set -e
            cd "$APP_DIR"
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d db
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml --env-file .env.prod exec -T db pg_isready -U support_user -d support_portal >/dev/null 2>&1; then
                echo "DB ready (attempt $i)"
                break
              fi
              sleep 2
            done
            docker compose -f docker-compose.prod.yml --env-file .env.prod restart app
            sleep 5

            echo ""
            echo "=== After repair ==="
            curl -sI http://127.0.0.1:3000/en | head -5
            curl -sI https://support.dataandmore.com/en | head -5
