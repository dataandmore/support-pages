# Deploys support.dataandmore.com on every push to main (after secrets are configured).
#
# Production server access (local):
#   ssh -i ~/.ssh/hetzner_claude -o IdentitiesOnly=yes root@89.167.19.63
#
# One-time setup — GitHub → Settings → Secrets and variables → Actions:
#   DEPLOY_SSH_KEY  Contents of ~/.ssh/hetzner_claude (private key)
#
# Optional:
#   DEPLOY_PORT     SSH port if not 22
#
# Manual deploy: Actions → Deploy to Production → Run workflow

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_HOST: 89.167.19.63
  DEPLOY_USER: root

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail

            find_repo() {
              for dir in \
                /opt/support-portal \
                /srv/support-portal \
                /root/support-portal \
                /root/support-pages \
                /opt/support-pages; do
                if [ -d "$dir/.git" ]; then
                  echo "$dir"
                  return 0
                fi
              done
              local deploy_sh
              deploy_sh=$(find /opt /root /srv /home -maxdepth 5 -name deploy.sh -type f 2>/dev/null | head -1 || true)
              if [ -n "$deploy_sh" ]; then
                dirname "$deploy_sh"
                return 0
              fi
              return 1
            }

            REPO_DIR=$(find_repo) || {
              echo "❌ Could not locate support portal repo on server"
              echo "Checked /opt/support-portal, /srv/support-portal, /root/*, and deploy.sh under /opt /root /srv /home"
              ls -la /opt/ /root/ /srv/ 2>/dev/null || true
              exit 1
            }

            echo "📂 Deploying from $REPO_DIR"
            cd "$REPO_DIR"

            if [ ! -d .git ]; then
              echo "❌ $REPO_DIR has deploy.sh but is not a git repository"
              exit 1
            fi

            git fetch origin main
            git reset --hard origin/main
            ./deploy.sh
