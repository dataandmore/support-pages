# Deploys support.dataandmore.com on every push to main (after secrets are configured).
#
# Production server access (local):
#   ssh -i ~/.ssh/hetzner_claude -o IdentitiesOnly=yes root@89.167.19.63
#
# One-time setup — GitHub → Settings → Secrets and variables → Actions:
#   DEPLOY_SSH_KEY  Contents of ~/.ssh/hetzner_claude (private key)
#
# Optional:
#   DEPLOY_PORT     SSH port if not 22
#
# Manual deploy: Actions → Deploy to Production → Run workflow

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_HOST: 89.167.19.63
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/support-portal

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            ./deploy.sh
