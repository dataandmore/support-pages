# Deploys support.dataandmore.com on every push to main.
#
# Production server access (local):
#   ssh -i ~/.ssh/hetzner_claude -o IdentitiesOnly=yes root@89.167.19.63
#
# One-time setup — GitHub → Settings → Secrets and variables → Actions:
#   DEPLOY_SSH_KEY  Contents of ~/.ssh/hetzner_claude (private key)
#
# Optional:
#   DEPLOY_PORT     SSH port if not 22
#
# Manual deploy: Actions → Deploy to Production → Run workflow

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  DEPLOY_HOST: 89.167.19.63
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/support-portal

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack release
        run: |
          tar czf release.tar.gz \
            --exclude=node_modules \
            --exclude=.next \
            --exclude=uploads \
            --exclude=.git \
            --exclude=release.tar.gz \
            . || [[ $? -eq 1 ]]

      - name: Upload release to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: release.tar.gz
          target: /tmp/

      - name: Extract and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          command_timeout: 40m
          script: |
            set -euo pipefail
            APP_DIR="${{ env.DEPLOY_PATH }}"
            mkdir -p "$APP_DIR"

            # Preserve server-only state; remove stale source tree (fixes nested src/src/).
            if [ -f "$APP_DIR/.env.prod" ]; then cp "$APP_DIR/.env.prod" /tmp/.env.prod.bak; fi
            if [ -d "$APP_DIR/uploads" ]; then rm -rf /tmp/uploads-bak && cp -a "$APP_DIR/uploads" /tmp/uploads-bak; fi
            find "$APP_DIR" -mindepth 1 -maxdepth 1 ! -name uploads -exec rm -rf {} +

            tar xzf /tmp/release.tar.gz -C "$APP_DIR"
            rm -f /tmp/release.tar.gz

            if [ -f /tmp/.env.prod.bak ]; then mv /tmp/.env.prod.bak "$APP_DIR/.env.prod"; fi
            if [ -d /tmp/uploads-bak ]; then rm -rf "$APP_DIR/uploads" && mv /tmp/uploads-bak "$APP_DIR/uploads"; fi

            cd "$APP_DIR"
            ./deploy.sh
